<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5DEBFF"/>
      <stop offset="100%" stop-color="#2DBBF2"/>
    </linearGradient>
    <linearGradient id="gLeft" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1F9CF0"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1387D6"/>
      <stop offset="100%" stop-color="#0E3F9A"/>
    </linearGradient>
    <linearGradient id="gStroke" x1="120" y1="90" x2="400" y2="430">
      <stop offset="0%" stop-color="#59E6FF"/>
      <stop offset="100%" stop-color="#1B4FE0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <symbol id="cube" viewBox="-44 -48 88 96">
      <polygon points="0,-48 -42,-24 0,0 42,-24" fill="url(#gTop)" stroke="#55DDFF" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="-42,-24 -42,24 0,48 0,0" fill="url(#gLeft)" stroke="#2E8AFF" stroke-width="3" stroke-linejoin="round"/>
      <polygon points="42,-24 42,24 0,48 0,0" fill="url(#gRight)" stroke="#56DFFF" stroke-width="3" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- Network structure -->
  <g stroke="url(#gStroke)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.98">
    <path d="M256 112 L256 208"/>
    <path d="M144 176 L222 224"/>
    <path d="M368 176 L290 224"/>
    <path d="M144 336 L222 288"/>
    <path d="M368 336 L290 288"/>
    <path d="M256 400 L256 304"/>

    <path d="M144 176 L256 112 L368 176 L368 336 L256 400 L144 336 Z" opacity="0.65"/>
    <path d="M144 176 L368 336" opacity="0.55"/>
    <path d="M368 176 L144 336" opacity="0.55"/>
    <path d="M256 112 L256 400" opacity="0.55"/>

    <path d="M183 144 L230 170" opacity="0.7"/>
    <path d="M282 170 L329 144" opacity="0.7"/>
    <path d="M176 256 L208 256" opacity="0.65"/>
    <path d="M304 256 L336 256" opacity="0.65"/>
    <path d="M183 368 L230 342" opacity="0.7"/>
    <path d="M282 342 L329 368" opacity="0.7"/>
  </g>

  <!-- Node circles -->
  <g fill="url(#gLeft)" stroke="#49DAFF" stroke-width="6">
    <circle cx="190" cy="152" r="15"/>
    <circle cx="322" cy="152" r="15"/>
    <circle cx="168" cy="256" r="15"/>
    <circle cx="344" cy="256" r="15"/>
    <circle cx="190" cy="360" r="15"/>
    <circle cx="322" cy="360" r="15"/>
  </g>

  <!-- Cubes -->
  <g filter="url(#glow)">
    <g transform="translate(256 256) scale(1.22)">
      <use href="#cube"/>
    </g>
    <g transform="translate(256 112) scale(0.78)">
      <use href="#cube"/>
    </g>
    <g transform="translate(144 176) scale(0.78)">
      <use href="#cube"/>
    </g>
    <g transform="translate(368 176) scale(0.78)">
      <use href="#cube"/>
    </g>
    <g transform="translate(144 336) scale(0.78)">
      <use href="#cube"/>
    </g>
    <g transform="translate(368 336) scale(0.78)">
      <use href="#cube"/>
    </g>
    <g transform="translate(256 400) scale(0.78)">
      <use href="#cube"/>
    </g>
  </g>
</svg>